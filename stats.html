<!DOCTYPE html>
<html>
<head>
  <title>Stats</title>
  <link rel="stylesheet" href="style.css">

  <!-- Clarity Tracking Code -->
  <script type="text/javascript">
    (function (c, l, a, r, i, t, y) {
      c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments) };
      t = l.createElement(r); t.async = 1; t.src = "https://www.clarity.ms/tag/" + i;
      y = l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t, y);
    })(window, document, "clarity", "script", "x03lw6frch");
  </script>
</head>
<body>
  <h1>Task Stats</h1>

  <div id="stats"></div>

  <button id="fetchClarityInsightsBtn" type="button">Fetch Clarity Live Insights</button>
  <button id="showClickTelemetryBtn" type="button">Show Recent Click Targets</button>
  <button id="exportClickTelemetryBtn" type="button">Export Click Telemetry</button>
  <button id="clearClickTelemetryBtn" type="button">Clear Click Telemetry</button>

  <pre id="clickTelemetryOutput"></pre>

  <a href="index.html">Back</a>

  <script src="telemetry.js"></script>
  <script>
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

    let total = tasks.length;
    let completed = tasks.filter(t => t.done).length;

    document.getElementById("stats").innerHTML = `
      <p>Total Tasks: ${total}</p>
      <p>Completed: ${completed}</p>
      <progress value="${completed}" max="${total || 1}"></progress>
    `;

    function trackClick(buttonName) {
      console.log("Clicked:", buttonName);

      if (typeof window.clarity === "function") {
        window.clarity("event", `${buttonName}_click`);
        window.clarity("set", "last_clicked_button", buttonName);
      }
    }

    function showRecentClickTelemetry() {
      if (!window.appTelemetry) {
        console.error("Telemetry module not loaded.");
        return;
      }

      const events = window.appTelemetry.getEvents();
      const recent = events.slice(-20).reverse();

      console.log("Recent click telemetry:", recent);
      document.getElementById("clickTelemetryOutput").textContent = JSON.stringify(recent, null, 2);
    }

    function clearClickTelemetry() {
      if (!window.appTelemetry) {
        console.error("Telemetry module not loaded.");
        return;
      }

      window.appTelemetry.clearEvents();
      document.getElementById("clickTelemetryOutput").textContent = "[]";
      console.log("Click telemetry cleared.");
    }

    function exportClickTelemetry() {
      if (!window.appTelemetry) {
        console.error("Telemetry module not loaded.");
        return;
      }

      const payload = window.appTelemetry.exportEvents();
      document.getElementById("clickTelemetryOutput").textContent = payload;
    }

    async function fetchClarityLiveInsights() {
      let clarityApiToken = localStorage.getItem("clarityApiToken") || "";

      if (!clarityApiToken) {
        clarityApiToken = window.prompt("Paste your Clarity API token:") || "";
      }

      clarityApiToken = clarityApiToken.trim();

      if (!clarityApiToken) {
        console.error("Clarity API token is required to call project-live-insights.");
        return;
      }

      localStorage.setItem("clarityApiToken", clarityApiToken);

      const endpoint = "https://www.clarity.ms/export-data/api/v1/project-live-insights";
      const params = new URLSearchParams({
        numOfDays: "1",
        dimension1: "URL",
        dimension2: "OS"
      });

      try {
        const response = await fetch(`${endpoint}?${params.toString()}`, {
          method: "GET",
          headers: {
            "Authorization": `Bearer ${clarityApiToken}`,
            "Content-Type": "application/json"
          }
        });

        const rawBody = await response.text();
        let parsedBody = rawBody;

        try {
          parsedBody = JSON.parse(rawBody);
        } catch (jsonParseError) {
          // Keep raw text when response isn't JSON.
        }

        console.log("Clarity live insights status:", response.status);
        console.log("Clarity live insights headers:", Object.fromEntries(response.headers.entries()));
        console.log("Clarity live insights body:", parsedBody);
      } catch (error) {
        console.error("Failed to call Clarity live insights endpoint:", error);
      }
    }

    document
      .getElementById("fetchClarityInsightsBtn")
      .addEventListener("click", function () {
        trackClick("fetchClarityInsightsBtn");
        fetchClarityLiveInsights();
      });

    document
      .getElementById("showClickTelemetryBtn")
      .addEventListener("click", showRecentClickTelemetry);

    document
      .getElementById("exportClickTelemetryBtn")
      .addEventListener("click", exportClickTelemetry);

    document
      .getElementById("clearClickTelemetryBtn")
      .addEventListener("click", clearClickTelemetry);
  </script>
</body>
</html>
